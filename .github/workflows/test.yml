name: Test Fabric Archive Bot

on:
  push:
    branches: [main, 'jdb/FAB2dev#15']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -Name Pester -ListAvailable | Where-Object { $_.Version -ge '5.0' })) {
            Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck
          }
          Import-Module Pester -MinimumVersion 5.0

      - name: Run Unit Tests
        shell: pwsh
        run: |
          .\tests\Invoke-Tests.ps1 -TestType Unit -OutputFormat JUnitXml -OutputFile unit-test-results.xml

      - name: Run Unit Tests with Coverage
        shell: pwsh
        run: |
          .\tests\Invoke-Tests.ps1 -TestType Unit -Coverage -OutputFormat JUnitXml -OutputFile coverage-test-results.xml

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Pester Test Results
          path: "*-test-results.xml"
          reporter: java-junit

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: coverage-reports
          path: |
            tests/coverage.xml
            *-test-results.xml
          retention-days: 30
